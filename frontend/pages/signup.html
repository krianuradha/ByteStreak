<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - ByteStreak</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .auth-container h1 {
      text-align: center;
      margin-bottom: 30px;
      color: var(--primary);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover {
      background: var(--primary-hover);
    }
    .btn:disabled {
      background: var(--border);
      cursor: not-allowed;
    }
    .error {
      color: #ff4444;
      font-size: 14px;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(255, 68, 68, 0.1);
      border-radius: 6px;
      display: none;
    }
    .success {
      color: #00c851;
      font-size: 14px;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(0, 200, 81, 0.1);
      border-radius: 6px;
      display: none;
    }
    .auth-link {
      text-align: center;
      margin-top: 20px;
      color: var(--text);
    }
    .auth-link a {
      color: var(--primary);
      text-decoration: none;
    }
    .auth-link a:hover {
      text-decoration: underline;
    }
    .checkbox-group {
      margin-bottom: 20px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text);
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">ByteStreak</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="problems.html">Problems</a>
      <a href="daily.html">Daily Challenge</a>
      <a href="login.html">Login</a>
      <a href="signup.html" class="active">Sign Up</a>
    </div>
  </nav>

  <div class="auth-container">
    <h1>Create Account</h1>
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    <form id="signupForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password (min 6 chars)" required minlength="6">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
      </div>
      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
          I agree to the Terms and Conditions
        </label>
      </div>
      <button type="submit" class="btn" id="submitBtn">Sign Up</button>
    </form>
    <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script>
    const API_URL = "http://localhost:5000";

    // Check if already logged in
    if (localStorage.getItem("token")) {
      window.location.href = "index.html";
    }

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const submitBtn = document.getElementById("submitBtn");
      const errorDiv = document.getElementById("error");
      const successDiv = document.getElementById("success");

      errorDiv.style.display = "none";
      successDiv.style.display = "none";

      // Validate passwords match
      if (password !== confirmPassword) {
        errorDiv.textContent = "Passwords do not match";
        errorDiv.style.display = "block";
        return;
      }

      // Validate password length
      if (password.length < 6) {
        errorDiv.textContent = "Password must be at least 6 characters";
        errorDiv.style.display = "block";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account...";

      try {
        const response = await fetch(`${API_URL}/auth/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Signup failed");
        }

        successDiv.textContent = "Account created! Redirecting to login...";
        successDiv.style.display = "block";

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = "block";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign Up";
      }
    });
  </script>
</body>
</html>
