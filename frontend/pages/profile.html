<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - ByteStreak</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .profile-page {
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .profile-header {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .profile-header h2 {
      color: var(--primary);
      margin-bottom: 10px;
    }
    .profile-header .email {
      color: var(--text);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-card h3 {
      font-size: 36px;
      color: var(--primary);
      margin-bottom: 5px;
    }
    .stat-card p {
      color: var(--text);
      font-size: 14px;
    }
    .submissions-section {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
    }
    .submissions-section h3 {
      margin-bottom: 20px;
      color: var(--primary);
    }
    .submission-item {
      padding: 15px;
      border-bottom: 1px solid var(--border);
    }
    .submission-item:last-child {
      border-bottom: none;
    }
    .submission-item .problem-title {
      color: var(--primary);
      font-weight: 600;
    }
    .submission-item .meta {
      font-size: 12px;
      color: var(--text);
      margin-top: 5px;
    }
    .status {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .status.accepted {
      background: #d4edda;
      color: #155724;
    }
    .status.pending {
      background: #fff3cd;
      color: #856404;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    .loading, .error, .not-logged-in {
      text-align: center;
      padding: 40px;
    }
    .error, .not-logged-in {
      color: #ff4444;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">ByteStreak</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="problems.html">Problems</a>
      <a href="daily.html">Daily Challenge</a>
      <a href="profile.html" class="active">Profile</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <section class="profile-page" id="profileContent">
    <div class="loading">Loading profile...</div>
  </section>

  <script src="../js/script.js"></script>
  <script>
    const API_URL = "http://localhost:5000";

    // Check auth and load profile
    const token = localStorage.getItem("token");
    const user = localStorage.getItem("user");

    if (!token || !user) {
      document.getElementById("profileContent").innerHTML = `
        <div class="not-logged-in">
          <h2>Please Login</h2>
          <p>You need to be logged in to view your profile.</p>
          <a href="login.html" class="btn">Login</a>
        </div>
      `;
    } else {
      const userData = JSON.parse(user);
      loadProfile();
    }

    // Logout handler
    document.getElementById("logoutBtn").addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    });

    async function loadProfile() {
      const container = document.getElementById("profileContent");
      const token = localStorage.getItem("token");
      const userData = JSON.parse(localStorage.getItem("user"));

      try {
        // Load stats
        const statsResponse = await fetch(`${API_URL}/submissions/stats`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const stats = await statsResponse.json();

        // Load submissions
        const subsResponse = await fetch(`${API_URL}/submissions`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const subsData = await subsResponse.json();
        const submissions = subsData.data || [];

        container.innerHTML = `
          <div class="profile-header">
            <h2>${userData.username}</h2>
            <p class="email">${userData.email}</p>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <h3>${stats.data?.totalSubmissions || 0}</h3>
              <p>Total Submissions</p>
            </div>
            <div class="stat-card">
              <h3>${stats.data?.accepted || 0}</h3>
              <p>Accepted</p>
            </div>
            <div class="stat-card">
              <h3>${stats.data?.problemsAttempted || 0}</h3>
              <p>Problems Attempted</p>
            </div>
            <div class="stat-card">
              <h3>${stats.data?.successRate || 0}%</h3>
              <p>Success Rate</p>
            </div>
          </div>

          <div class="submissions-section">
            <h3>Recent Submissions</h3>
            <div id="submissionsList">
              ${submissions.length === 0 ? '<p>No submissions yet. Start solving problems!</p>' : ''}
              ${submissions.map(sub => `
                <div class="submission-item">
                  <div class="problem-title">${sub.problem?.title || "Unknown Problem"}</div>
                  <span class="status ${sub.status}">${sub.status}</span>
                  <div class="meta">
                    ${sub.language} | Test Cases: ${sub.testCasesPassed}/${sub.totalTestCases} | 
                    ${new Date(sub.submittedAt).toLocaleDateString()}
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      } catch (error) {
        container.innerHTML = `<div class="error">Error loading profile: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
